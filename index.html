<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManteGym | Enlaces Oficiales</title>
    <meta name="description" content="Accede a todos los recursos oficiales de ManteGym. Transforma tu cuerpo y tu salud.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .linktree-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .linktree-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .linktree-logo {
            width: 140px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.3));
            transition: var(--transition);
        }

        .linktree-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.5));
        }

        .linktree-header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 0;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .linktree-header p {
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .linktree-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .link-card {
            position: relative;
            width: 100%;
            height: 160px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .link-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 229, 255, 0.15);
        }

        .link-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: var(--transition);
        }

        .link-card:hover img {
            transform: scale(1.1);
        }

        .link-card .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7));
            z-index: 2;
        }

        .link-card h2 {
            position: relative;
            z-index: 3;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            transition: var(--transition);
        }

        .link-card:hover h2 {
            color: var(--primary);
            letter-spacing: 5px;
        }

        .linktree-footer {
            margin-top: auto;
            padding-top: 3rem;
            text-align: center;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .social-icons a {
            color: var(--text-white);
            transition: var(--transition);
        }

        .social-icons a:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>
<body class="linktree-page">
    <div class="linktree-container">
        <header class="linktree-header">
            <img src="/images/logo888.png" alt="ManteGym Logo" class="linktree-logo">
            <h1>ManteGym</h1>
            <p>Selecciona una opción para empezar</p>
        </header>

        <div class="linktree-links">
            <!-- Link 1: Método MG -->
            <a href="/metodo.html" class="link-card">
                <img src="/images/FotoFondo.png" alt="Método MG">
                <div class="overlay"></div>
                <h2>Método MG</h2>
            </a>

            <!-- Link 2: YouTube -->
            <a href="https://youtube.com/@mantegym?si=ApZad4FCe4i0WJO3" target="_blank" class="link-card">
                <img src="/images/hero.png" alt="YouTube">
                <div class="overlay"></div>
                <h2>Canal YouTube</h2>
            </a>

            <!-- Link 3: Placeholder -->
            <a href="#" class="link-card">
                <img src="/images/1.jpeg" alt="Comunidad">
                <div class="overlay"></div>
                <h2>Comunidad</h2>
            </a>
        </div>

        <footer class="linktree-footer">
            <div class="social-icons">
                <a href="#"><i data-lucide="instagram"></i></a>
                <a href="https://youtube.com/@mantegym?si=ApZad4FCe4i0WJO3" target="_blank"><i data-lucide="youtube"></i></a>
                <a href="https://wa.me/YOUR_PHONE_NUMBER"><i data-lucide="message-circle"></i></a>
            </div>
            <p>&copy; 2026 ManteGym. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
