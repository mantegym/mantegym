<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManteGym | Enlaces Oficiales</title>
    <meta name="description" content="Accede a todos los recursos oficiales de ManteGym. Transforma tu cuerpo y tu salud.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .linktree-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            max-width: 480px;
            margin: 0 auto;
            justify-content: center;
        }

        .linktree-header {
            margin-bottom: 1rem;
            text-align: center;
            width: 100%;
        }

        .linktree-logo {
            width: 90px;
            height: auto;
            display: block;
            margin: 0 auto 0.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.3));
            transition: var(--transition);
        }

        .linktree-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.5));
        }

        .linktree-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .linktree-header p {
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            margin-top: 0.1rem;
            opacity: 0.8;
        }

        .linktree-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-card {
            position: relative;
            width: 100%;
            height: 110px;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .link-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: var(--transition);
        }

        /* Specific fix for Sponsor Image - trying to show more content */
        .sponsor-card img {
            object-fit: cover;
            object-position: center 15%; /* Muestra más de la parte superior donde suele estar el logo/texto */
            opacity: 0.6;
        }

        .link-card:hover img {
            transform: scale(1.05);
        }

        .link-card .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7));
            z-index: 2;
        }

        .link-card h2 {
            position: relative;
            z-index: 3;
            color: white;
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: var(--transition);
        }

        /* WhatsApp Card - Brand Aligned (Electric Blue/Black) */
        .whatsapp-card {
            height: 90px;
            background: rgba(0, 229, 255, 0.05) !important;
            border: 2px solid var(--primary) !important;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
            gap: 0.75rem;
        }

        .whatsapp-card:hover {
            background: rgba(0, 229, 255, 0.1) !important;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2);
            transform: translateY(-3px) scale(1.02);
        }

        .whatsapp-card i {
            width: 24px;
            height: 24px;
            color: var(--primary);
            z-index: 3;
        }

        .whatsapp-card h2 {
            font-size: 1.15rem;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .linktree-footer {
            margin-top: 1rem;
            text-align: center;
            color: var(--text-gray);
            font-size: 0.75rem;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
            justify-content: center;
        }

        .social-icons a {
            color: var(--text-white);
        }

        .social-icons a:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="linktree-page">
    <div class="linktree-container">
        <header class="linktree-header">
            <img src="/images/logo888.png" alt="ManteGym Logo" class="linktree-logo">
            <h1>ManteGym</h1>
            <p>Selecciona una opción para empezar</p>
        </header>

        <div class="linktree-links">
            <!-- Link 1: Método MG -->
            <a href="/metodo.html" class="link-card">
                <img src="/images/FotoFondo.png" alt="Método MG">
                <div class="overlay"></div>
                <h2>Método MG</h2>
            </a>

            <!-- Link 2: YouTube -->
            <a href="https://youtube.com/@mantegym?si=ApZad4FCe4i0WJO3" target="_blank" class="link-card">
                <img src="/images/hero.png" alt="YouTube">
                <div class="overlay"></div>
                <h2>Canal YouTube</h2>
            </a>

            <!-- Link 3: Sponsor -->
            <a href="http://zumu.be/mantegym" target="_blank" class="link-card sponsor-card">
                <img src="/images/sponsor_banner.png" alt="Sponsor">
                <div class="overlay"></div>
                <h2>Sponsor Oficial</h2>
            </a>

            <!-- Link 4: WhatsApp -->
            <a href="https://wa.me/34613339231" target="_blank" class="link-card whatsapp-card">
                <i data-lucide="message-circle"></i>
                <h2>WhatsApp Directo</h2>
            </a>
        </div>

        <footer class="linktree-footer">
            <div class="social-icons">
                <a href="#"><i data-lucide="instagram"></i></a>
                <a href="https://youtube.com/@mantegym?si=ApZad4FCe4i0WJO3" target="_blank"><i data-lucide="youtube"></i></a>
            </div>
            <p>&copy; 2026 ManteGym. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
